AWSTemplateFormatVersion: '2010-09-09'
Description: 20-0-advanced — S3 static site + CloudFront CDN

Parameters:
  BucketSuffix:
    Type: String
    Description: Unique suffix appended to bucket name (e.g. your AWS account ID)
    Default: ''

Resources:

  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "20-0-advanced${BucketSuffix}"
      # No public access — CloudFront OAC handles all access
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "20-0-advanced-oac${BucketSuffix}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        PriceClass: PriceClass_100   # US/Canada/Europe — cheapest
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods:  [GET, HEAD]
          # CachingOptimized managed policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        # Data files get a longer TTL
        CacheBehaviors:
          - PathPattern: '/data/*'
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods:  [GET, HEAD]
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            Compress: true
        # SPA fallback: 404 → index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${WebBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub
                  - "arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistId}"
                  - DistId: !GetAtt CloudFrontDistribution.Id

Outputs:
  CloudFrontURL:
    Description: Your game URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  BucketName:
    Description: S3 bucket name
    Value: !Ref WebBucket
  DistributionId:
    Description: CloudFront distribution ID (needed for cache invalidations)
    Value: !GetAtt CloudFrontDistribution.Id
